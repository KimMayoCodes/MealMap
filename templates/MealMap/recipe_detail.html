{% extends "base.html" %}

{% block title %}{{ recipe.title }} | MealMap{% endblock %}

{% block content %}
<h1 class="text-success">{{ recipe.title }}</h1>
<p><strong>Description:</strong> {{ recipe.description }}</p>
<p><strong>Cook Time:</strong> {{ recipe.cook_time }} minutes</p>
<p><strong>Instructions:</strong> {{ recipe.instructions }}</p>

<a href="{% url 'recipe_update' recipe.pk %}" class="btn btn-warning">Edit</a>
<a href="{% url 'recipe_delete' recipe.pk %}" class="btn btn-danger">Delete</a>
<a href="{% url 'recipe_list' %}" class="btn btn-secondary">Back</a>
{% endblock %}
