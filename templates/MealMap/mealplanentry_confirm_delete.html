{% extends "base.html" %}

{% block title %}Delete Meal Entry | MealMap{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body p-4">
                <h1 class="h3 mb-3 text-danger">Delete Meal Entry</h1>

                <p>
                    Are you sure you want to delete
                    <strong>{{ object.day_of_week }} {{ object.meal_type }}</strong>
                    for <strong>{{ object.recipe.title }}</strong>?
                </p>

                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Delete</button>
                    <a href="{% url 'mealplan_detail' object.meal_plan.pk %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
