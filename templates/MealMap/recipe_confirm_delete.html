{% extends "base.html" %}

{% block title %}Delete Recipe | MealMap{% endblock %}

{% block content %}
<h1 class="mb-4 text-danger">Delete Recipe</h1>

<p>Are you sure you want to delete <strong>{{ object.title }}</strong>?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'recipe_detail' object.pk %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
