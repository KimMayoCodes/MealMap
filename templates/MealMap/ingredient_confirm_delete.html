{% extends "base.html" %}

{% block title %}Delete Ingredient | MealMap{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body p-4">
                <h1 class="h3 mb-3 text-danger">Delete Ingredient</h1>

                <p>
                    Are you sure you want to delete
                    <strong>{{ object.quantity }} {{ object.name }}</strong>?
                </p>

                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Delete</button>
                    <a href="{% url 'recipe_detail' object.recipe.pk %}" class="btn btn-secondary">Cancel</a>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
