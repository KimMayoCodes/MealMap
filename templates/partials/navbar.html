<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">
            MealMap
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- Left side navigation -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'recipe_list' %}">Recipes</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'mealplan_list' %}">Meal Plans</a>
                </li>
            </ul>

            <!-- Right side auth section -->
            <ul class="navbar-nav">
                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <span class="navbar-text d-flex align-items-center gap-3">
                            <span>Hello, {{ user.username }}</span>

                            {% if user.is_staff %}
                                <span class="badge bg-warning text-dark">Admin</span>
                            {% endif %}

                            <form method="post" action="{% url 'logout' %}" class="mb-0 d-inline">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-light btn-sm">
                                    Logout
                                </button>
                            </form>
                        </span>
                    </li>
                {% else %}
                    <li class="nav-item me-2">
                        <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">
                            Login
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="btn btn-light btn-sm" href="{% url 'signup' %}">
                            Sign Up
                        </a>
                    </li>
                {% endif %}
            </ul>

        </div>
    </div>
</nav>
